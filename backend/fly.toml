app = "investapp"

[build]
dockerfile = "Dockerfile"

[mounts]
source = "investapp_data"
destination = "/data"

[env]
SYMBOL = "MU"
MARKET = "US"
FRONTEND_ORIGIN = "https://investapp-8icmvwewu-oleksandkovs-projects.vercel.app"
MARKET_DB_PATH = "/data/market_data.db"

[[services]]
internal_port = 8000
protocol = "tcp"

[[services.ports]]
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443

[[services.tcp_checks]]
interval = "15s"
timeout = "2s"
grace_period = "1s"

[[services.http_checks]]
interval = "10s"
timeout = "2s"
grace_period = "1s"
method = "get"
path = "/api/quote"
